<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#05060D" />
  <title>The Rep Station · Live Leaderboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,600;12..96,700;12..96,800&family=Outfit:wght@100..900&display=swap" rel="stylesheet" media="print" onload="this.media='all'" />
  <noscript><link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,600;12..96,700;12..96,800&family=Outfit:wght@100..900&display=swap" rel="stylesheet" /></noscript>
  <style>
    /* ----- Theme tokens (inlined subset of the operator theme) -------------- */
    :root{
      --ink:#05060D;
      --fg:#ffffff;
      --line:#2a3145;
      --line-2:#3b4358;
      --mute-1:#c6ccdb;
      --mute-2:#8b93a8;
      --mute-3:#6a728a;
      --o8-blue:#00FFFF;
      --o8-text:#7DFFFF;
      --o8-deep:#00BFCC;
      --error-9:#E5484D;
      --o8-font-body:'Outfit', system-ui, -apple-system, sans-serif;
      --o8-font-display:'Bricolage Grotesque','Outfit', sans-serif;
    }

    /* ----- Mobile-first public leaderboard ---------------------------------- */
    *{box-sizing:border-box}
    html,body{margin:0;background:var(--ink);color:var(--fg);font-family:var(--o8-font-body);-webkit-font-smoothing:antialiased;}
    body{height:100dvh;overflow:hidden;}
    .lb{position:relative;z-index:1;height:100dvh;max-width:560px;margin:0 auto;padding:18px 16px calc(env(safe-area-inset-bottom) + 16px);display:flex;flex-direction:column;gap:14px;}
    .lb__glow{position:fixed;inset:0;z-index:0;pointer-events:none;
      background:radial-gradient(120% 60% at 50% -8%,rgba(0,255,255,.22),transparent 60%),radial-gradient(80% 50% at 100% 100%,rgba(0,255,255,.10),transparent 60%);}

    /* Header */
    .lb-top{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;}
    .lb-wordmark{font-family:var(--o8-font-display);font-weight:800;letter-spacing:-.02em;line-height:1;font-size:clamp(20px,6vw,28px);white-space:nowrap;}
    .lb-wordmark b{color:#fff;} .lb-wordmark i{color:var(--o8-blue);font-style:normal;margin-left:.18em;}
    .lb-eyebrow{margin-top:5px;font-size:9px;font-weight:900;letter-spacing:.26em;color:var(--mute-3);text-transform:uppercase;}
    .lb-assoc{text-align:right;display:flex;flex-direction:column;align-items:flex-end;gap:5px;flex:none;}
    .lb-assoc small{font-size:8px;font-weight:900;letter-spacing:.16em;color:var(--mute-3);text-transform:uppercase;white-space:nowrap;}
    .lb-live{display:inline-flex;align-items:center;gap:7px;font-weight:900;font-size:12px;letter-spacing:.18em;text-transform:uppercase;color:#fff;}
    .lb-dot{width:8px;height:8px;border-radius:50%;background:var(--o8-blue);box-shadow:0 0 0 0 rgba(0,255,255,.55);animation:lbpulse 1.8s infinite;}
    @keyframes lbpulse{0%{box-shadow:0 0 0 0 rgba(0,255,255,.55)}70%{box-shadow:0 0 0 8px rgba(0,255,255,0)}100%{box-shadow:0 0 0 0 rgba(0,255,255,0)}}

    /* ----- Winner carousel (responsive) ------------------------------------- */
    .lb-pod-wrap{position:relative;margin:0 -16px;padding:2px 0 6px;overflow-x:auto;scroll-snap-type:x mandatory;-webkit-overflow-scrolling:touch;scrollbar-width:none;}
    .lb-pod-wrap::-webkit-scrollbar{display:none;}
    .lb-podium{display:flex;align-items:stretch;gap:12px;padding:6px 16px;width:max-content;}
    .lb-pod{position:relative;flex:0 0 76vw;max-width:300px;scroll-snap-align:center;display:flex;flex-direction:column;gap:10px;
      padding:16px 16px 18px;border:1px solid var(--line-2);border-radius:20px;
      background:linear-gradient(165deg,rgba(28,34,51,.72),rgba(18,21,31,.86));cursor:pointer;transition:filter .15s,transform .15s;}
    .lb-pod:active{filter:brightness(1.1);transform:scale(.99);}
    .lb-pod.leader{flex-basis:84vw;max-width:330px;border-color:transparent;
      background:linear-gradient(150deg,var(--o8-deep),var(--o8-blue) 58%,#7dffff);
      box-shadow:0 18px 50px rgba(0,255,255,.32),inset 0 1px 0 rgba(255,255,255,.2);}
    .lb-pod__top{display:flex;align-items:center;justify-content:space-between;}
    .lb-place{font-size:10px;font-weight:900;letter-spacing:.16em;text-transform:uppercase;color:var(--mute-2);}
    .lb-pod.leader .lb-place{color:#fff;}
    .lb-rankno{font-family:var(--o8-font-display);font-size:24px;font-weight:800;line-height:1;color:rgba(255,255,255,.22);}
    .lb-pod.leader .lb-rankno{color:rgba(255,255,255,.45);}
    .lb-pod__name b{display:block;font-weight:800;font-size:17px;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .lb-pod__name span{display:block;margin-top:3px;font-size:11px;font-weight:700;color:var(--mute-2);}
    .lb-pod.leader .lb-pod__name span{color:rgba(255,255,255,.85);}
    .lb-pod__score{font-family:var(--o8-font-display);font-weight:800;letter-spacing:-.02em;line-height:1;font-variant-numeric:tabular-nums;color:#fff;font-size:30px;}
    .lb-pod.leader .lb-pod__score{font-size:38px;}
    .lb-pod__score sup{font-family:var(--o8-font-body);font-size:13px;font-weight:800;color:var(--mute-2);vertical-align:super;margin-left:2px;}
    .lb-pod.leader .lb-pod__score sup{color:rgba(255,255,255,.8);}
    .lb-pod__foot{font-size:11px;font-weight:700;color:var(--mute-3);}
    .lb-pod.leader .lb-pod__foot{color:rgba(255,255,255,.85);}
    .lb-pod.dnf .lb-pod__score{color:#ff8aa8;}
    @media (min-width:520px){
      .lb-pod-wrap{margin:0;overflow:visible;}
      .lb-podium{display:grid;grid-template-columns:1fr 1.18fr 1fr;align-items:end;width:auto;padding:6px 0;}
      .lb-pod{flex:none;max-width:none;}
      .lb-pod--2{order:1;} .lb-pod--1{order:2;} .lb-pod--3{order:3;}
      .lb-pod.leader{transform:translateY(-10px);}
    }

    /* Search */
    .lb-search{position:relative;}
    .lb-search svg{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--mute-3);}
    .lb-search input{width:100%;padding:14px 16px 14px 42px;border:1px solid var(--line-2);border-radius:14px;background:rgba(255,255,255,.04);color:#fff;font:inherit;font-size:15px;}
    .lb-search input::placeholder{color:var(--mute-3);}
    .lb-search input:focus{outline:none;border-color:rgba(125,255,255,.6);background:rgba(0,255,255,.08);}

    /* Ranking list */
    .lb-rank-head{display:flex;align-items:center;justify-content:space-between;margin-top:2px;}
    .lb-rank-head h2{margin:0;font-size:11px;font-weight:900;letter-spacing:.16em;text-transform:uppercase;color:var(--mute-2);}
    .lb-rank-head span{font-size:11px;font-weight:800;color:var(--mute-3);}
    .lb-rows{display:flex;flex-direction:column;gap:9px;flex:1;min-height:0;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:4px;scrollbar-width:none;-ms-overflow-style:none;}
    .lb-rows::-webkit-scrollbar{display:none;}
    .lb-row{display:grid;grid-template-columns:38px 1fr auto;align-items:center;gap:12px;padding:13px 14px;border:1px solid var(--line);border-radius:16px;background:linear-gradient(165deg,rgba(28,34,51,.55),rgba(20,24,35,.68));cursor:pointer;transition:filter .15s;}
    .lb-row:active{filter:brightness(1.12);}
    .lb-row.leader{border-color:transparent;background:linear-gradient(90deg,rgba(0,255,255,.14),rgba(0,255,255,.03) 46%,transparent);box-shadow:inset 3px 0 0 var(--o8-blue);}
    .lb-row__rank{font-family:var(--o8-font-display);font-size:22px;font-weight:800;color:var(--mute-1);text-align:center;}
    .lb-row.leader .lb-row__rank{color:var(--o8-blue);}
    .lb-row__name b{display:block;font-weight:800;font-size:15px;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .lb-row__name>span{display:block;margin-top:2px;font-size:11px;font-weight:700;color:var(--mute-3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .lb-row__name>span .ok,.lb-row__name>span .bad{display:inline;}
    .lb-row__name span .ok{color:#9fe870;} .lb-row__name span .bad{color:#ff8aa8;}
    .lb-row__score{font-family:var(--o8-font-display);font-size:21px;font-weight:800;letter-spacing:-.01em;font-variant-numeric:tabular-nums;color:#fff;text-align:right;}
    .lb-row.dnf .lb-row__score{color:#ff8aa8;font-size:16px;}
    .lb-empty{padding:18px;text-align:center;color:var(--mute-3);font-size:13px;font-weight:600;}

    /* Footer prize banner */
    .lb-prize{display:flex;align-items:center;gap:11px;padding:14px 15px;border:1px solid var(--line);border-radius:16px;background:linear-gradient(165deg,rgba(28,34,51,.6),rgba(17,20,29,.78));color:var(--mute-1);font-size:12.5px;line-height:1.45;}
    .lb-prize .lb-dot{flex:none;animation:none;}
    .lb-prize b{color:#fff;}
    .lb-brand{text-align:center;font-size:10px;font-weight:900;letter-spacing:.16em;color:var(--mute-3);text-transform:uppercase;}

    /* States */
    .pub-state{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;text-align:center;padding:40px 24px;color:var(--mute-2);}
    .pub-state b{font-family:var(--o8-font-display);font-size:clamp(26px,7vw,38px);line-height:1.04;color:#fff;letter-spacing:-.03em;}
    .pub-err{padding:11px 14px;border:1px solid rgba(229,72,77,.5);border-left:4px solid var(--error-9);border-radius:14px;background:rgba(229,72,77,.08);color:#ffb3b6;font-size:13px;font-weight:700;}

    /* Athlete detail — themed bottom sheet */
    .sheet-bg{position:fixed;inset:0;background:rgba(3,5,11,.74);backdrop-filter:blur(6px);opacity:0;pointer-events:none;transition:opacity .2s;z-index:50;}
    .sheet-bg.on{opacity:1;pointer-events:auto;}
    .sheet{position:fixed;left:0;right:0;bottom:0;z-index:51;max-height:86vh;overflow:auto;margin:0 auto;max-width:560px;padding:10px clamp(16px,4vw,26px) calc(env(safe-area-inset-bottom) + 24px);border-top:1px solid var(--line);border-top-left-radius:26px;border-top-right-radius:26px;background:linear-gradient(165deg,rgba(28,34,51,.98),rgba(17,20,29,.99));box-shadow:0 -30px 90px rgba(0,0,0,.6);transform:translateY(100%);transition:transform .26s cubic-bezier(.2,.8,.2,1);}
    .sheet.on{transform:translateY(0);}
    .sheet__grip{width:42px;height:4px;border-radius:3px;background:var(--line-2);margin:6px auto 14px;}
    .sheet__close{position:absolute;top:14px;right:16px;width:34px;height:34px;border:1px solid var(--line-2);border-radius:10px;background:rgba(255,255,255,.04);color:var(--mute-1);font-size:18px;cursor:pointer;}
    .sheet__name{margin:0;font-family:var(--o8-font-display);font-size:clamp(30px,6vw,44px);font-weight:800;letter-spacing:-.03em;line-height:.95;}
    .sheet__meta{color:var(--mute-2);font-weight:700;margin:6px 0 18px;font-size:13px;}
    .sheet__kpis{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px;}
    .sheet__kpi{border:1px solid var(--line-2);border-radius:16px;background:rgba(255,255,255,.025);padding:11px 12px;}
    .sheet__kpi b{display:block;font-family:var(--o8-font-display);font-size:clamp(22px,5vw,30px);line-height:.9;font-weight:800;}
    .sheet__kpi span{display:block;margin-top:7px;font-size:9px;font-weight:900;letter-spacing:.14em;text-transform:uppercase;color:var(--mute-3);}
    .slot-row{display:grid;grid-template-columns:64px 1fr auto;align-items:center;gap:12px;padding:13px 14px;margin-bottom:9px;border:1px solid var(--line);border-radius:16px;background:linear-gradient(165deg,rgba(28,34,51,.6),rgba(22,26,38,.7));}
    .slot-row__no{font-family:var(--o8-font-display);font-size:22px;font-weight:800;color:var(--mute-1);letter-spacing:-.02em;}
    .slot-row__mid .sc{font-family:var(--o8-font-display);font-size:22px;font-weight:800;letter-spacing:-.02em;font-variant-numeric:tabular-nums;}
    .slot-row__mid .sc.dnf{color:#ff8aa8;}
    .slot-row__mid .rr{margin-top:3px;font-size:12px;font-weight:700;color:var(--mute-3);}
    .slot-row__reps{text-align:right;font-family:var(--o8-font-display);font-size:20px;font-weight:800;line-height:1.05;font-variant-numeric:tabular-nums;}
    .slot-row__reps .ok{color:#9fe870;} .slot-row__reps .bad{color:#ff8aa8;}

    /* Per-exercise breakdown (target vs achieved) inside the athlete sheet */
    .slot-card{margin-bottom:9px;}
    .slot-card .slot-row{margin-bottom:0;border-bottom-left-radius:0;border-bottom-right-radius:0;border-bottom:none;}
    .slot-ex{border:1px solid var(--line);border-top:none;border-bottom-left-radius:16px;border-bottom-right-radius:16px;background:rgba(12,15,24,.5);padding:8px 14px 10px;display:flex;flex-direction:column;gap:2px;}
    .slot-ex__item{display:grid;grid-template-columns:1fr auto;align-items:center;gap:10px;padding:5px 0;border-bottom:1px solid rgba(38,45,64,.45);}
    .slot-ex__item:last-child{border-bottom:none;}
    .slot-ex__name{font-size:12.5px;font-weight:700;color:var(--mute-1);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .slot-ex__val{font-family:var(--o8-font-display);font-size:14px;font-weight:800;font-variant-numeric:tabular-nums;letter-spacing:-.01em;}
    .slot-ex__val .unit{font-family:var(--o8-font-body);font-size:10px;font-weight:800;color:var(--mute-3);text-transform:uppercase;letter-spacing:.08em;margin-left:4px;}
    .slot-ex__val.hit{color:#9fe870;} .slot-ex__val.miss{color:#fff;}
  </style>
</head>
<body>
  <div class="lb__glow"></div>
  <div class="lb" id="public"><!-- rendered by JS --></div>

  <div class="sheet-bg" id="sheetBg"></div>
  <div class="sheet" id="sheet" role="dialog" aria-modal="true">
    <button class="sheet__close" id="sheetClose" aria-label="Close">×</button>
    <div class="sheet__grip"></div>
    <h2 class="sheet__name" id="shName">Athlete</h2>
    <div class="sheet__meta" id="shMeta"></div>
    <div class="sheet__kpis" id="shKpis"></div>
    <div id="shSlots"></div>
  </div>

  <script>
    // ---- Config -------------------------------------------------------------
    // Paste your Convex cloud URL here after `npx convex dev/deploy`
    // (same value used in html/leaderboard/js/convexClient.js).
    const CONVEX_URL = 'https://superb-canary-10.eu-west-1.convex.cloud';

    // Optional: pin to a specific wave with ?wave=<wave_id>. Default = latest wave.
    const WAVE_ID = new URLSearchParams(location.search).get('wave') || undefined;

    const $ = (id) => document.getElementById(id);
    const configured = () => /^https:\/\/[^/]+\.convex\.cloud$/i.test(CONVEX_URL);

    async function cq(path, args = {}) {
      const res = await fetch(`${CONVEX_URL}/api/query`, {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ path, args, format: 'json' }),
      });
      const data = await res.json().catch(() => ({}));
      if (!res.ok || data.status === 'error' || data.errorMessage) throw new Error(data.errorMessage || `${path} failed`);
      return data.value;
    }

    // ---- Formatting ---------------------------------------------------------
    function fmtTime(ms) {
      if (ms == null || isNaN(ms)) return '--:--:--';
      const t = Math.max(0, Math.floor(ms / 1000));
      const h = Math.floor(t / 3600), m = Math.floor((t % 3600) / 60), s = t % 60;
      const p = (n) => String(n).padStart(2, '0');
      return h > 0 ? `${p(h)}:${p(m)}:${p(s)}` : `${p(m)}:${p(s)}`;
    }
    // splits a time into a big part + small hundredths-style suffix for the podium
    function fmtScoreParts(r) {
      if (!isFin(r)) return { main: 'DNF', sup: pct(r.final_pct) };
      return { main: fmtTime(r.total_time_ms), sup: '' };
    }
    const pct = (p) => Math.round((p || 0) * 100) + '%';
    const isFin = (r) => r.status === 'finished' && r.total_time_ms != null;
    const scoreLabel = (r) => (isFin(r) ? fmtTime(r.total_time_ms) : 'DNF·' + pct(r.final_pct));
    const initial = (name) => (String(name || '?').trim()[0] || '?').toUpperCase();
    function esc(s) {
      return String(s == null ? '' : s).replace(/[&<>"]/g, (c) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c]));
    }
    function gapStr(r, leadMs) {
      if (!isFin(r) || leadMs == null) return '';
      const d = (r.total_time_ms - leadMs) / 1000;
      return d <= 0 ? 'Time to beat' : `+${d.toFixed(2)}s off lead`;
    }

    // Per-exercise "achieved / target" breakdown for one slot. Hit target => green.
    function exerciseBreakdown(slot) {
      const ex = (slot.exercises || []).filter((e) => e && e.name);
      if (!ex.length) return '';
      return `<div class="slot-ex">${ex.map((e) => {
        const done = Number(e.done) || 0;
        const target = Number(e.target) || 0;
        const hit = target > 0 && done >= target;
        return `<div class="slot-ex__item">
          <div class="slot-ex__name">${esc(e.name)}</div>
          <div class="slot-ex__val ${hit ? 'hit' : 'miss'}">${done}<span style="color:var(--mute-3)"> / ${target}</span><span class="unit">${esc(e.unit || 'reps')}</span></div>
        </div>`;
      }).join('')}</div>`;
    }

    // ---- State --------------------------------------------------------------
    let currentWaveId = WAVE_ID || '';
    let athletes = [];          // full ranked list from Convex
    let query = '';             // search filter

    // ---- Render -------------------------------------------------------------
    function podiumCard(r, place) {
      if (!r) {
        return `<article class="lb-pod lb-pod--${place}${place === 1 ? ' leader' : ''}">
          <div class="lb-pod__top"><span class="lb-place">${place === 1 ? 'Leader' : place + (place === 2 ? 'nd' : 'rd')}</span><span class="lb-rankno">0${place}</span></div>
          <div class="lb-pod__name"><b>Open slot</b><span>Awaiting result</span></div>
          <div class="lb-pod__score">—</div>
          <div class="lb-pod__foot">No score yet</div></article>`;
      }
      const sp = fmtScoreParts(r);
      const placeLabel = place === 1 ? 'Leader' : place + (place === 2 ? 'nd' : 'rd');
      return `<article class="lb-pod lb-pod--${place}${place === 1 ? ' leader' : ''}${isFin(r) ? '' : ' dnf'}" data-key="${esc(r.athlete_key)}">
        <div class="lb-pod__top"><span class="lb-place">${placeLabel}</span><span class="lb-rankno">0${place}</span></div>
        <div class="lb-pod__name"><b>${esc(r.athlete)}</b><span>${r.slots_count > 1 ? r.slots_count + ' slots' : 'Best run'}</span></div>
        <div class="lb-pod__score">${esc(sp.main)}${sp.sup ? `<sup>${esc(sp.sup)}</sup>` : ''}</div>
        <div class="lb-pod__foot">${r.reps_total} reps${r.slots_count > 1 ? ' · ' + r.slots_count + ' slots' : ''}</div></article>`;
    }

    function rankRow(r, leadMs) {
      return `<div class="lb-row${r.rank === 1 ? ' leader' : ''}${isFin(r) ? '' : ' dnf'}" data-key="${esc(r.athlete_key)}">
        <div class="lb-row__rank">${r.rank}</div>
        <div class="lb-row__name"><b>${esc(r.athlete)}</b><span>${r.rank === 1 ? 'Time to beat' : esc(gapStr(r, leadMs)) || `${r.reps_total} reps`}</span></div>
        <div class="lb-row__score">${esc(scoreLabel(r))}</div></div>`;
    }

    function renderRows() {
      const leadMs = athletes.find(isFin)?.total_time_ms ?? null;
      const q = query.trim().toLowerCase();
      const list = q ? athletes.filter((r) => r.athlete.toLowerCase().includes(q)) : athletes;
      const rows = $('rows');
      if (!rows) return;
      rows.innerHTML = list.length
        ? list.map((r) => rankRow(r, leadMs)).join('')
        : `<div class="lb-empty">No athlete matches “${esc(query)}”.</div>`;
      bindKeys(rows);
    }

    function renderBoard(b) {
      currentWaveId = b.wave_id || currentWaveId;
      athletes = b.athletes || [];
      const a = athletes;
      const leadMs = a.find(isFin)?.total_time_ms ?? null;
      const waveName = b.wave_name || b.event_name || 'The Rep Station';

      const header = `
        <header class="lb-top">
          <div>
            <div class="lb-wordmark"><b>THE REP</b><i>STATION</i></div>
            <div class="lb-eyebrow">BY HYPERLAB</div>
          </div>
          <div class="lb-assoc">
            <small>Live standings</small>
            <span class="lb-live"><span class="lb-dot"></span>LIVE</span>
          </div>
        </header>`;

      if (!a.length) {
        $('public').innerHTML = (window.__err || '') + header +
          `<div class="pub-state"><b>No results yet</b><div>Scores appear here automatically the moment a slot ends.</div></div>` +
          `<div class="lb-brand">${esc(waveName)} · BY HYPERLAB</div>`;
        return;
      }

      const podium = `<div class="lb-pod-wrap" id="podWrap"><div class="lb-podium">
        ${podiumCard(a[0] || null, 1)}${podiumCard(a[1] || null, 2)}${podiumCard(a[2] || null, 3)}
      </div></div>`;

      const search = `<div class="lb-search">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
        <input id="search" type="search" inputmode="search" placeholder="Search your name…" value="${esc(query)}" />
      </div>`;

      const rankHead = `<div class="lb-rank-head"><h2>Full ranking</h2><span>All ${a.length} athlete${a.length === 1 ? '' : 's'}</span></div>`;
      const rowsHtml = `<div class="lb-rows" id="rows">${a.map((r) => rankRow(r, leadMs)).join('')}</div>`;

      const prize = `<div class="lb-prize"><span class="lb-dot"></span><div>Tap any athlete to see their <b>slot scores</b>, reps and times.</div></div>`;
      const brand = `<div class="lb-brand">${esc(b.event_name || waveName)} · BY HYPERLAB</div>`;

      $('public').innerHTML = (window.__err || '') + header +
        podium + search + rankHead + rowsHtml + prize + brand;

      // bind taps
      bindKeys($('public'));
      const inp = $('search');
      if (inp) inp.addEventListener('input', (e) => { query = e.target.value; renderRows(); });
    }

    function bindKeys(scope) {
      scope.querySelectorAll('[data-key]').forEach((el) => {
        el.onclick = () => openAthlete(el.dataset.key);
      });
    }

    // ---- Athlete detail sheet ----------------------------------------------
    async function openAthlete(key) {
      if (!key || !currentWaveId) return;
      openSheet();
      $('shName').textContent = '…'; $('shMeta').textContent = ''; $('shKpis').innerHTML = ''; $('shSlots').innerHTML = '';
      try {
        const d = await cq('leaderboard:athlete', { wave_id: currentWaveId, athlete_key: key });
        const sl = d.slots || [];
        $('shName').textContent = d.athlete || 'Athlete';
        $('shMeta').textContent = sl.length + ' slot' + (sl.length === 1 ? '' : 's') + ' completed';
        const fin = sl.filter(isFin);
        const best = fin.length ? Math.min(...fin.map((s) => s.total_time_ms)) : null;
        const totReps = sl.reduce((n, s) => n + (s.reps_total || 0), 0);
        $('shKpis').innerHTML = `
          <div class="sheet__kpi"><b>${sl.length}</b><span>Slots</span></div>
          <div class="sheet__kpi"><b>${best != null ? fmtTime(best) : '—'}</b><span>Best time</span></div>
          <div class="sheet__kpi"><b>${totReps}</b><span>Total reps</span></div>`;
        $('shSlots').innerHTML = sl.map((s) =>
          `<div class="slot-card">
             <div class="slot-row">
               <div class="slot-row__no">Slot ${s.slot_number}</div>
               <div class="slot-row__mid">
                 <div class="sc${isFin(s) ? '' : ' dnf'}">${scoreLabel(s)}</div>
                 <div class="rr">${isFin(s) ? 'Completed' : 'Did not finish'}${s.penalty_count ? ' · ' + s.penalty_count + ' pen' : ''}</div>
               </div>
               <div class="slot-row__reps">${s.reps_total}<br><span style="font-weight:700;color:var(--mute-3)">reps</span></div>
             </div>
             ${exerciseBreakdown(s)}
           </div>`).join('') || '<div class="lb-empty">No slot data.</div>';
      } catch (e) {
        $('shSlots').innerHTML = `<div class="pub-err">Could not load slots: ${esc(e.message)}</div>`;
      }
    }
    function openSheet() { $('sheet').classList.add('on'); $('sheetBg').classList.add('on'); }
    function closeSheet() { $('sheet').classList.remove('on'); $('sheetBg').classList.remove('on'); }
    $('sheetBg').addEventListener('click', closeSheet);
    $('sheetClose').addEventListener('click', closeSheet);
    document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeSheet(); });

    // ---- Polling lifecycle --------------------------------------------------
    let timer = null;
    const intervalMs = () => (document.visibilityState === 'visible' ? 5000 : 20000);

    async function refresh() {
      try {
        const b = await cq('leaderboard:board', WAVE_ID ? { wave_id: WAVE_ID } : {});
        window.__err = '';
        renderBoard(b);
      } catch (e) {
        window.__err = `<div class="pub-err">Connection issue: ${esc(e.message)}. Retrying…</div>`;
        if (!$('public').querySelector('.lb-top')) $('public').innerHTML = window.__err;
      }
    }
    function schedule() {
      clearTimeout(timer);
      timer = setTimeout(async () => { try { await refresh(); } finally { schedule(); } }, intervalMs());
    }

    // Offline design preview: open with ?demo=1 to render sample data (no network).
    function demoBoard() {
      const mk = (rank, athlete, ms, slot, v, iv, fin = true, fp = 1) => ({
        rank, athlete, athlete_key: athlete.toLowerCase().replace(/\s+/g, '_'),
        status: fin ? 'finished' : 'dnf', total_time_ms: fin ? ms : null, final_pct: fp,
        valid_reps: v, invalid_reps: iv, reps_total: v + iv, penalty_count: iv,
        best_slot_number: slot, slots_count: 1,
      });
      return {
        wave_id: 'demo', wave_name: 'Arena Board #2014', event_name: 'The Rep Station',
        exercises_label: 'Sled Push',
        athletes: [
          mk(1, 'Arjun Mehta', 19840, 12, 18, 0),
          mk(2, 'Kabir Singh', 21270, 31, 17, 1),
          mk(3, 'Neha Kulkarni', 22510, 22, 16, 2),
          mk(4, 'Leah Park', 24090, 8, 15, 1),
          mk(5, 'Sam Okoro', 0, 19, 9, 3, false, 0.72),
        ],
      };
    }

    (function start() {
      if (new URLSearchParams(location.search).get('demo')) { renderBoard(demoBoard()); return; }
      if (!configured()) {
        $('public').innerHTML = `<div class="pub-state"><b>Almost there</b>
          <div>Set <strong style="color:#fff">CONVEX_URL</strong> at the top of this file to your Convex deployment URL.</div></div>`;
        return;
      }
      refresh().finally(schedule);
    })();
  </script>
</body>
</html>
